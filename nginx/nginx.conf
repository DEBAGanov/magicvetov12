server {
    listen 80;
    server_name magiacvetov12.ru www.magiacvetov12.ru localhost;

    # Редирект www -> без www
    if ($host = www.magiacvetov12.ru) {
        return 301 https://magiacvetov12.ru$request_uri;
    }

    # API проксирование
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://magiacvetov12.ru' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, Accept, Origin, X-Auth-Token, Cache-Control, X-Client-Type, X-Client-Version, X-Session-Id' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '3600' always;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' '0';
            return 204;
        }

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Мини-аппы Telegram и MAX
    location /miniapp/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /max-miniapp/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Корень -> редирект на сайт
    location = / {
        return 301 /website/;
    }

    # Статика сайта — проксируем к Spring Boot
    location /website/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Кэширование статики
        location ~* /website/.*\.(css|js|jpg|jpeg|png|gif|svg|ico|woff2?)$ {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Actuator и другие эндпоинты
    location /actuator/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
    }

    # Swagger
    location /swagger-ui/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
    }

    # Всё остальное
    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip сжатие
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        image/svg+xml;
}
