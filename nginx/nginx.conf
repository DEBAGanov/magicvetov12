server {
    listen 80;
    server_name magiacvetov12.ru www.magiacvetov12.ru localhost;

    # Редирект www -> без www
    if ($host = www.magiacvetov12.ru) {
        return 301 https://magiacvetov12.ru$request_uri;
    }

    # API -> Spring Boot
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Telegram & MAX Mini Apps -> Spring Boot
    location /miniapp/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /max-miniapp/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Monitoring & docs -> Spring Boot
    location /actuator/ { proxy_pass http://app:8080; }
    location /swagger-ui/ { proxy_pass http://app:8080; }
    location /feed { proxy_pass http://app:8080; }
    location /max-admin/ { proxy_pass http://app:8080; }
    location /debug/ { proxy_pass http://app:8080; }

    # Next.js static assets (long cache)
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else -> Next.js frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Gzip
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types application/json application/javascript text/css text/plain text/xml image/svg+xml;
}
