<body class="max-theme checkout-page">
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Оформление заказа...</div>
    </div>

    <!-- App Container -->
    <div id="app" class="app-container" style="display: none;">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <button class="back-button" id="back-button">← Назад</button>
                <span class="header-title">Оформление заказа</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Delivery Options -->
            <section class="delivery-section">
                <h3>Способ получения</h3>
                <div class="delivery-options">
                    <label class="option-card">
                        <input type="radio" name="deliveryMethod" value="DELIVERY" id="delivery-courier" checked>
                        <div class="option-content">
                            <div class="option-title">🚗 Доставка курьером</div>
                            <div class="option-subtitle">Доставим по адресу</div>
                        </div>
                    </label>
                    <label class="option-card">
                        <input type="radio" name="deliveryMethod" value="PICKUP" id="pickup-option">
                        <div class="option-content">
                            <div class="option-title">🏪 Самовывоз</div>
                            <div class="option-subtitle">ул. Володарского, 5 (ост. 7 школа)</div>
                            <div class="option-price">Бесплатно</div>
                        </div>
                    </label>
                </div>

                <!-- Address Input -->
                <div class="address-section" id="address-section">
                    <h4>Адрес доставки</h4>
                    <div class="address-input-container">
                        <input type="text"
                               id="address-input"
                               placeholder="Введите адрес доставки..."
                               class="address-input">
                    </div>
                    <div class="address-note">
                        <small>Укажите адрес доставки. Стоимость доставки рассчитается автоматически.</small>
                    </div>
                </div>
            </section>

            <!-- Payment Options -->
            <section class="payment-section">
                <h3>Способ оплаты</h3>
                <div class="payment-options">
                    <label class="option-card">
                        <input type="radio" name="paymentMethod" value="SBP" id="payment-sbp" checked>
                        <div class="option-content">
                            <div class="option-title">
                                <img src="../miniapp/sbp-logo.png" alt="СБП" style="height: 40px; width: auto; max-width: 120px;">
                            </div>
                            <div class="option-subtitle">Быстрая оплата</div>
                        </div>
                    </label>
                </div>
            </section>

            <!-- Order Summary -->
            <section class="order-summary">
                <h2>Ваш заказ</h2>
                <div class="order-items" id="order-items">
                    <!-- Order items will be loaded here -->
                </div>
                <div class="order-total">
                    <span>Товары: <span id="items-total">₽0</span></span>
                    <span class="delivery-cost">Доставка: <span id="delivery-cost">₽0</span></span>
                    <div class="total-amount">Итого: <span id="total-amount">₽0</span></div>
                </div>
            </section>

            <!-- User Info Section -->
            <section class="user-info-section">
                <h3>Получатель заказа</h3>
                <div class="user-info-display" id="user-info-display">
                    <div class="user-name" id="user-name">Загрузка...</div>
                    <div class="user-phone" id="user-phone">Загрузка...</div>
                </div>
                <div class="comment-section">
                    <textarea id="order-comment"
                              placeholder="Комментарий к заказу (необязательно)"
                              class="comment-textarea"></textarea>
                </div>
            </section>

            <!-- Submit Button -->
            <div class="submit-section">
                <button class="submit-button" id="submit-order" disabled>
                    Оформить заказ <span id="final-total">₽0</span>
                </button>
            </div>
        </main>
    </div>

    <!-- Error Screen -->
    <div id="error-screen" class="error-screen" style="display: none;">
        <div class="error-icon">⚠️</div>
        <div class="error-message" id="error-message">Произошла ошибка</div>
        <button class="retry-button" id="retry-button">Повторить</button>
    </div>

    <!-- Scripts -->
    <script src="max-api.js"></script>
    <script src="max-checkout-app.js"></script>
    <script>
        // Global instance for phone input handling
        let maxCheckoutApp;

        // Initialize app
        function initializeApp() {
            console.log('🔧 Starting MAX Checkout initialization...');
            maxCheckoutApp = new PizzaNatMaxCheckoutApp();
            window.maxCheckoutApp = maxCheckoutApp;
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(initializeApp, 100);
            });
        } else {
            setTimeout(initializeApp, 100);
        }
    </script>
</body>
</html>
