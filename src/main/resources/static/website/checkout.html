<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа — Магия Цветов</title>
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/website/css/variables.css">
  <link rel="stylesheet" href="/website/css/base.css">
  <link rel="stylesheet" href="/website/css/layout.css">
  <link rel="stylesheet" href="/website/css/components.css">
  <link rel="stylesheet" href="/website/css/pages.css">
  <link rel="stylesheet" href="/website/css/responsive.css">
  <link rel="icon" type="image/svg+xml" href="/website/favicon.svg">
</head>
<body>

  <header class="header">
    <div class="container header__inner">
      <a href="/website/" class="header__logo">
        <svg class="header__logo-icon" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="20" fill="#E85D75"/>
          <path d="M20 10c-2 3-7 6-7 11a7 7 0 0014 0c0-5-5-8-7-11z" fill="#fff"/>
          <path d="M20 14c-1 2-4 4-4 7a4 4 0 008 0c0-3-3-5-4-7z" fill="#FDE8EC"/>
        </svg>
        <div>
          <span class="header__logo-text">Магия Цветов</span>
          <span class="header__logo-tagline">Доставка цветов</span>
        </div>
      </a>
      <div class="header__actions">
        <a href="/website/cart.html" class="header__cart-btn">
          <svg class="header__cart-icon" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.16 14.26l.04-.12.94-1.7h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0020.01 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C4.52 15.37 5.48 17 7 17h12v-2H7.42c-.14 0-.25-.11-.25-.25z"/></svg>
          Корзина
          <span class="header__cart-badge"></span>
        </a>
      </div>
    </div>
  </header>

  <main class="checkout-page">
    <div class="container">
      <div class="breadcrumbs">
        <a href="/website/">Главная</a>
        <span class="breadcrumbs__sep">/</span>
        <a href="/website/cart.html">Корзина</a>
        <span class="breadcrumbs__sep">/</span>
        <span>Оформление</span>
      </div>

      <h1 style="margin-bottom:var(--space-xl)">Оформление заказа</h1>

      <div id="checkout-container">
        <form id="checkout-form" class="checkout__layout">
          <!-- Левая колонка: форма -->
          <div>
            <!-- Способ получения -->
            <div class="checkout__section">
              <div class="checkout__section-title">Способ получения</div>
              <div class="checkout__radio-group">
                <div class="radio-card radio-card--active" data-delivery="DELIVERY">
                  <div class="radio-card__label">🚗 Доставка</div>
                  <div class="radio-card__desc">Курьер привезёт к двери</div>
                </div>
                <div class="radio-card" data-delivery="PICKUP">
                  <div class="radio-card__label">🏪 Самовывоз</div>
                  <div class="radio-card__desc">Заберите сами</div>
                </div>
              </div>
            </div>

            <!-- Адрес -->
            <div id="address-block" class="checkout__section">
              <div class="checkout__section-title">Адрес доставки</div>
              <div class="form-group">
                <input type="text" id="checkout-address" class="form-input"
                       placeholder="Улица, дом, квартира" required>
              </div>
            </div>

            <!-- Контактные данные -->
            <div class="checkout__section">
              <div class="checkout__section-title">Контактные данные</div>
              <div class="form-group">
                <label class="form-label" for="checkout-name">Имя</label>
                <input type="text" id="checkout-name" class="form-input"
                       placeholder="Ваше имя" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="checkout-phone">Телефон</label>
                <input type="tel" id="checkout-phone" class="form-input"
                       placeholder="+7 (___) ___-__-__" required>
              </div>
            </div>

            <!-- Способ оплаты -->
            <div class="checkout__section">
              <div class="checkout__section-title">Способ оплаты</div>
              <div class="checkout__radio-group">
                <div class="radio-card radio-card--active" data-payment="CASH">
                  <div class="radio-card__label">💵 Наличные</div>
                  <div class="radio-card__desc">При получении</div>
                </div>
                <div class="radio-card" data-payment="ONLINE">
                  <div class="radio-card__label">💳 Картой онлайн</div>
                  <div class="radio-card__desc">СБП или карта</div>
                </div>
              </div>
            </div>

            <!-- Комментарий -->
            <div class="checkout__section">
              <div class="checkout__section-title">Комментарий</div>
              <div class="form-group">
                <textarea id="checkout-comment" class="form-input form-textarea"
                          placeholder="Пожелания к заказу (необязательно)"></textarea>
              </div>
            </div>
          </div>

          <!-- Правая колонка: итого -->
          <div class="checkout__summary" id="checkout-summary">
            <div class="loading-placeholder"><div class="loader"></div></div>
          </div>
        </form>
      </div>

      <div style="margin-top:var(--space-xl);text-align:center">
        <button type="submit" form="checkout-form" id="checkout-submit" class="btn btn--primary btn--lg btn--full" style="max-width:500px">
          Оформить заказ
        </button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <span>&copy; 2026 Магия Цветов</span>
      </div>
    </div>
  </footer>

  <script src="/website/js/api.js"></script>
  <script src="/website/js/app.js"></script>
  <script src="/website/js/checkout.js"></script>
</body>
</html>
